<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Mission Control</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
.top{background:#1a202c;border-bottom:1px solid #2d3748;padding:14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99}
.top h1{font-size:1.1rem}
.badge{font-size:.7rem;padding:3px 10px;border-radius:10px;background:rgba(72,187,120,.15);color:#48bb78;border:1px solid rgba(72,187,120,.3)}
.nav{display:flex;background:#1a202c;border-bottom:1px solid #2d3748}
.nbtn{flex:1;padding:14px 8px;border:none;background:none;color:#718096;font-size:.75rem;cursor:pointer;border-bottom:3px solid transparent;text-align:center}
.nbtn.on{color:#6c5ce7;border-bottom-color:#6c5ce7}
.pg{display:none;padding:16px;max-width:700px;margin:0 auto}
.pg.show{display:block}
.sec{font-size:.7rem;color:#718096;text-transform:uppercase;letter-spacing:.05em;margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid #2d3748}
.card{background:#1a202c;border:1px solid #2d3748;border-radius:8px;padding:14px;margin-bottom:10px}
.row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #2d3748;min-height:52px}
.row:last-child{border-bottom:none}
.row input{width:24px;height:24px;accent-color:#48bb78;flex-shrink:0;cursor:pointer}
.row label{flex:1;font-size:.88rem;cursor:pointer}
.row.done label{text-decoration:line-through;color:#718096}
.who{font-size:.68rem;color:#4299e1;display:block}
.when{font-size:.65rem;color:#718096;display:block;margin-top:2px}
.srow{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #2d3748;font-size:.88rem}
.srow:last-child{border-bottom:none}
.sl{color:#718096}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.g{background:#48bb78}.r{background:#fc8181}
.arow{display:flex;gap:8px;margin-top:12px}
.arow input{flex:1;background:#0f1117;border:1px solid #2d3748;border-radius:6px;padding:10px;color:#e2e8f0;font-size:.88rem}
.arow input:focus{border-color:#6c5ce7;outline:none}
.arow button{background:#6c5ce7;color:#fff;border:none;border-radius:6px;padding:10px 18px;cursor:pointer;font-weight:600}
.empty{color:#718096;text-align:center;padding:24px;font-style:italic}
</style>
</head>
<body>

<div class="top"><h1>&#x1F3AE; Mission Control</h1><span class="badge">&#x25CF; Live</span></div>

<nav class="nav" id="nav">
  <button class="nbtn on" id="b-ov">&#x1F4CA; Overview</button>
  <button class="nbtn" id="b-my">&#x2705; My Tasks</button>
  <button class="nbtn" id="b-ow">&#x1F989; OWL</button>
  <button class="nbtn" id="b-cr">&#x23F0; Cron</button>
</nav>

<div class="pg show" id="p-ov">
  <div class="sec">Status</div>
  <div class="card">
    <div class="srow"><span class="sl">My Open</span><span id="v-open">0</span></div>
    <div class="srow"><span class="sl">My Done</span><span id="v-done">0</span></div>
    <div class="srow"><span class="sl">OWL Active</span><span id="v-owl">0</span></div>
    <div class="srow"><span class="sl">Cron Jobs</span><span id="v-cron">0</span></div>
  </div>
  <div class="sec">Recent</div>
  <div class="card" id="c-recent"></div>
</div>

<div class="pg" id="p-my">
  <div class="sec">Mark's Action Items</div>
  <div class="card" id="c-my"></div>
</div>

<div class="pg" id="p-ow">
  <div class="sec">OWL's To-Do</div>
  <div class="card">
    <div id="c-ow"></div>
    <div class="arow"><input id="oi" placeholder="Add OWL task..."><button id="ob">Add</button></div>
  </div>
</div>

<div class="pg" id="p-cr">
  <div class="sec">Cron Jobs</div>
  <div class="card" id="c-cr"></div>
</div>

<script type="text/javascript">
(function(){
var map={'b-ov':'p-ov','b-my':'p-my','b-ow':'p-ow','b-cr':'p-cr'};
var nav=document.getElementById('nav');
nav.onclick=function(e){
  var id=e.target.id;
  if(!map[id])return;
  var pgs=document.getElementsByClassName('pg');
  for(var i=0;i<pgs.length;i++)pgs[i].classList.remove('show');
  var bs=document.getElementsByClassName('nbtn');
  for(var i=0;i<bs.length;i++)bs[i].classList.remove('on');
  document.getElementById(map[id]).classList.add('show');
  e.target.classList.add('on');
};

var myTasks=JSON.parse(localStorage.getItem('mc1')||'null')||[
  {id:1,text:'Finish parts justification spreadsheet',who:'Mark',meeting:'After Sales Sync',date:'28 May',done:false},
  {id:2,text:'Windscreens on purchasing request list',who:'Mark',meeting:'After Sales Sync',date:'28 May',done:false},
  {id:3,text:'PDR: finalize SMART objectives',who:'Mark & JB',meeting:'PDR Review',date:'29 May',done:false},
  {id:4,text:'Asbestos clearance quote',who:'Mark',meeting:'Operational Review',date:'29 May',done:false},
  {id:5:text:'Approve employee handbook draft',who:'Mark',meeting:'Legal Briefing',date:'29 May',done:false}
];
var owlTasks=JSON.parse(localStorage.getItem('mc2')||'null')||[
  {id:101,text:'Parts sales dashboard FX fix',done:false},
  {id:102,text:'WordPress comment moderation',done:true},
  {id:103,text:'Akismet on wpForo',done:true},
  {id:104,text:'wpForo hardening',done:true},
  {id:105,text:'Obsidian vault auto-push',done:true},
  {id:106,text:'Mission Control APK',done:false},
  {id:107,text:'Shattered Veil books to shop',done:false}
];
var crons=[
  {name:'RPG Weekly Brief',sched:'Mon 9am',ok:true},
  {name:'Tuco LinkedIn Post',sched:'Wed 8am',ok:true},
  {name:'RPG Market Intel',sched:'Tue 9am',ok:true},
  {name:'Content Spark',sched:'Fri 10am',ok:true},
  {name:'RPG Content Gen',sched:'Sun 11am',ok:true},
  {name:'Obsidian Auto-Push',sched:'Hourly',ok:true},
  {name:'System Update',sched:'Daily 2am',ok:false}
];

function save(){localStorage.setItem('mc1',JSON.stringify(myTasks));localStorage.setItem('mc2',JSON.stringify(owlTasks))}
function $(i){return document.getElementById(i)}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

/* Checkbox change via delegation */
document.addEventListener('change',function(e){
  if(e.target.type!=='checkbox')return;
  var lid=e.target.getAttribute('data-l');
  var tid=parseInt(e.target.getAttribute('data-t'));
  if(lid==='m'){
    for(var i=0;i<myTasks.length;i++){if(myTasks[i].id===tid){myTasks[i].done=e.target.checked;break;}}
    save();draw();
  }else if(lid==='o'){
    for(var i=0;i<owlTasks.length;i++){if(owlTasks[i].id===tid){owlTasks[i].done=e.target.checked;break;}}
    save();draw();
  }
});

function draw(){
  /* My Tasks */
  var h='',open=0,done=0;
  for(var i=0;i<myTasks.length;i++){
    var t=myTasks[i];
    if(t.done)done++;else open++;
    h+='<div class="row'+(t.done?' done':'')+'">';
    h+='<input type="checkbox" data-l="m" data-t="'+t.id+'"'+(t.done?' checked':'')+'>';
    h+='<label>'+esc(t.text);
    h+='<span class="who">'+esc(t.who)+'</span>';
    h+='<span class="when">'+esc(t.meeting)+' - '+t.date+'</span></label></div>';
  }
  $('c-my').innerHTML=h||'<div class="empty">No tasks</div>';
  $('v-open').textContent=open;
  $('v-done').textContent=done;

  /* OWL Tasks */
  h='';var act=0;
  for(var i=0;i<owlTasks.length;i++){
    var t=owlTasks[i];
    if(!t.done)act++;
    h+='<div class="row'+(t.done?' done':'')+'">';
    h+='<input type="checkbox" data-l="o" data-t="'+t.id+'"'+(t.done?' checked':'')+'>';
    h+='<label>'+esc(t.text)+'</label></div>';
  }
  $('c-ow').innerHTML=h;
  $('v-owl').textContent=act;

  /* Cron */
  h='';
  for(var i=0;i<crons.length;i++){
    var c=crons[i];
    h+='<div class="srow"><div><b><span class="dot '+(c.ok?'g':'r')+'"></span>'+esc(c.name)+'</b>';
    h+='<br><small style="color:#718096">'+esc(c.sched)+'</small></div>';
    h+='<small style="color:'+(c.ok?'#48bb78':'#fc8181')+'">'+(c.ok?'OK':'Err')+'</small></div>';
  }
  $('c-cr').innerHTML=h;
  $('v-cron').textContent=crons.length;

  /* Recent */
  var r=[];
  for(var i=0;i<myTasks.length;i++)if(!myTasks[i].done)r.push({t:myTasks[i].text,w:'Mark'});
  for(var i=0;i<owlTasks.length;i++)if(!owlTasks[i].done)r.push({t:owlTasks[i].text,w:'OWL'});
  h='';
  for(var i=0;i<Math.min(r.length,5);i++){
    h+='<div class="row" style="min-height:40px"><label>&#x2022; '+esc(r[i].t)+'<span class="who"> '+esc(r[i].w)+'</span></label></div>';
  }
  $('c-recent').innerHTML=h||'<div class="empty">All caught up! &#x1F389;</div>';
}

$('ob').onclick=function(){
  var v=$('oi').value.trim();
  if(!v)return;
  owlTasks.push({id:Date.now(),text:v,done:false});
  save();$('oi').value='';draw();
};
$('oi').onkeydown=function(e){if(e.key==='Enter')$('ob').onclick();};

draw();
})();
</script>
</body>
</html>
